<!DOCTYPE html>
<html class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Redactly — How It Works</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    html, body { margin: 0; padding: 0; width: 1200px; height: 400px; overflow: hidden; }
    body { background: var(--background); }
  </style>
</head>
<body class="feature-bg">
<div class="flow-container">
  <!-- Step 1 -->
  <div class="flow-card">
    <div class="flow-step">1</div>
    <div class="flow-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    </div>
    <div class="flow-title">Add Keywords</div>
    <div class="flow-desc">Define people, companies, and terms to always redact</div>
  </div>

  <!-- Arrow -->
  <div class="flow-arrow">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- Step 2 -->
  <div class="flow-card">
    <div class="flow-step">2</div>
    <div class="flow-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6"/><path d="M9 14h6"/></svg>
    </div>
    <div class="flow-title">Paste Text</div>
    <div class="flow-desc">Paste any text containing sensitive information</div>
  </div>

  <!-- Arrow -->
  <div class="flow-arrow">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- Step 3 -->
  <div class="flow-card">
    <div class="flow-step">3</div>
    <div class="flow-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
    </div>
    <div class="flow-title">Redact &amp; Copy</div>
    <div class="flow-desc">One click replaces sensitive data with tokens</div>
  </div>

  <!-- Arrow -->
  <div class="flow-arrow">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <!-- Step 4 -->
  <div class="flow-card">
    <div class="flow-step">4</div>
    <div class="flow-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </div>
    <div class="flow-title">Restore Later</div>
    <div class="flow-desc">Swap tokens back to originals when needed</div>
  </div>
</div>
</body>
</html>
