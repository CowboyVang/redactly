<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Nord Frost gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e81ac"/>
      <stop offset="100%" stop-color="#81a1c1"/>
    </linearGradient>

    <!-- macOS squircle clip path -->
    <clipPath id="squircle">
      <path d="
        M 0 224 C 0 84 84 0 224 0 L 800 0 C 940 0 1024 84 1024 224
        L 1024 800 C 1024 940 940 1024 800 1024 L 224 1024
        C 84 1024 0 940 0 800 Z
      "/>
    </clipPath>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2e3440" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Clipped background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- White elements with shadow -->
    <g filter="url(#shadow)">
      <!-- Left curly brace -->
      <text x="220" y="620" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
            font-size="520" font-weight="300" fill="#eceff4" text-anchor="middle">{</text>

      <!-- Right curly brace -->
      <text x="804" y="620" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
            font-size="520" font-weight="300" fill="#eceff4" text-anchor="middle">}</text>

      <!-- Center redaction bar -->
      <rect x="380" y="448" width="264" height="72" rx="14" fill="#eceff4"/>
    </g>
  </g>
</svg>
